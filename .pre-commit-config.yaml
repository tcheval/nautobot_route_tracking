repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(\.claude/|reports/)
      - id: end-of-file-fixer
        exclude: ^(\.claude/|reports/)
      - id: check-yaml
        args: [--unsafe]
        exclude: ^\.claude/
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(nautobot_route_tracking/|tests/|scripts/)
      - id: ruff-format
        files: ^(nautobot_route_tracking/|tests/|scripts/)

  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks
        entry: gitleaks git --pre-commit --no-banner
        language: system
        pass_filenames: false
